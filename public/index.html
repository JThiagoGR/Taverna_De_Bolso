<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Taverna De Bolso</title><link rel="stylesheet" href="style.css"></head><body><div id="login"><div class="card"><h1>🍺 Taverna De Bolso</h1><input id="name" placeholder="Seu nome" maxlength="20"><input id="room" placeholder="Nome da sala" maxlength="20" value="taverna1"><div class="btns"><button id="joinPlayer">Entrar como Jogador</button><button id="joinMaster">Entrar como Mestre 🎲</button></div></div></div><div id="game" class="hidden"><canvas id="c"></canvas><div id="playerInfo"></div><div id="toolbar"><button id="tMove" class="active" title="Mover">✋</button><button id="tDraw" title="Desenhar parede">✏️</button><button id="tRuler" title="Régua">📏</button><button id="tDice" title="Dados">🎲</button><button id="tZoomIn" title="Zoom +">+</button><button id="tZoomOut" title="Zoom -">−</button></div><button id="masterToggle">☰</button><div id="masterPanel" class="hidden"><h3>Painel do Mestre</h3><label>Mapa: <input type="file" id="mapFile" accept="image/*"></label><button id="clearWalls">Limpar Paredes</button><button id="toggleFog">🌫️ Névoa: OFF</button><button id="toggleLight">💡 Luz Global: OFF</button><hr><h4>Criar NPC</h4><input id="npcName" placeholder="Nome" value="Goblin"><input id="npcHp" type="number" placeholder="HP" value="7" style="width:60px"><input id="npcCa" type="number" placeholder="CA" value="15" style="width:60px"><button id="addNpc">+ NPC</button></div><div id="tokenSheet" class="hidden"><h4 id="sheetName">Token</h4><div id="sheetId" style="font-size:11px;color:#888;margin-bottom:8px"></div><label>HP: <input id="sheetHp" type="number"></label><label>Max: <input id="sheetMax" type="number"></label><label>CA: <input id="sheetCa" type="number"></label><label>Luz: <input id="sheetLight" type="number" value="0"></label><button id="sheetClose">Fechar</button></div></div><script src="/socket.io/socket.io.js"></script><script src="app.js"></script></body></html>
