<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Taverna De Bolso</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login">
  <div class="card">
    <h1>🍺 Taverna De Bolso</h1>
    <input id="name" placeholder="Seu nome" maxlength="20">
    <input id="room" placeholder="Nome da sala" maxlength="20" value="taverna1">
    <div class="btns">
      <button id="joinPlayer">Entrar como Jogador</button>
      <button id="joinMaster">Entrar como Mestre 🎲</button>
    </div>
  </div>
</div>

<div id="game" class="hidden">
  <canvas id="c"></canvas>
  
  <div id="playerInfo">
    <div><span class="label">ID:</span><span class="value" id="infoId">-</span></div>
    <div><span class="label">Nome:</span><span class="value" id="infoName">-</span></div>
    <div><span class="label">Sala:</span><span class="value" id="infoRoom">-</span></div>
  </div>
  
  <div id="toolbar">
    <button id="tMove" class="active" title="Mover">✋</button>
    <button id="tDraw" title="Desenhar parede">✏️</button>
    <button id="tRuler" title="Régua">📏</button>
    <button id="tDice" title="Dados">🎲</button>
    <button id="tZoomIn" title="Zoom +">+</button>
    <button id="tZoomOut" title="Zoom -">−</button>
  </div>

  <button id="masterToggle">☰</button>
  
  <div id="masterPanel" class="hidden">
    <h3>⚙️ Painel do Mestre</h3>
    <label>Mapa de fundo:
      <input type="file" id="mapFile" accept="image/*">
    </label>
    <button id="clearWalls">🗑️ Limpar Paredes</button>
    <button id="toggleFog">🌫️ Névoa: OFF</button>
    <button id="toggleLight">💡 Luz Global: OFF</button>
    <hr>
    <h4>👹 Criar NPC/Monstro</h4>
    <input id="npcName" placeholder="Nome" value="Goblin">
    <div style="display:flex;gap:6px">
      <input id="npcHp" type="number" placeholder="HP" value="7" style="flex:1">
      <input id="npcCa" type="number" placeholder="CA" value="15" style="flex:1">
    </div>
    <button id="addNpc">+ Adicionar NPC</button>
    <hr>
    <div id="playersList"><h4>👥 Jogadores</h4><div id="playersContainer"></div></div>
  </div>

  <div id="tokenSheet" class="hidden">
    <h4 id="sheetName">Token</h4>
    <div id="sheetId" style="font-size:11px;color:#888;margin-bottom:10px;font-family:monospace"></div>
    <label>HP atual: <input id="sheetHp" type="number"></label>
    <label>HP máximo: <input id="sheetMax" type="number"></label>
    <label>Classe Armadura: <input id="sheetCa" type="number"></label>
    <label>Raio de Luz: <input id="sheetLight" type="number" value="0"></label>
    <button id="sheetClose">✓ Salvar e Fechar</button>
  </div>
  
  <div id="diceLog"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
